name: Build Arch package

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  build-arch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm \
            base-devel \
            git \
            curl \
            wget \
            nodejs \
            npm \
            pnpm \
            rust \
            cargo \
            python \
            jq \
            p7zip \
            unzip \
            squashfs-tools \
            libarchive \
            file

          useradd --create-home --shell /bin/bash builder

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Give workspace to builder
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          mkdir -p /home/builder/.cache
          chown -R builder:builder /home/builder

      - name: Build application
        run: |
          runuser -u builder -- env \
            HOME=/home/builder \
            MAX_BUILD_THREADS=2 \
            GITHUB_ACTIONS=true \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            bash -lc 'cd "'"$GITHUB_WORKSPACE"'" && make build-app-fresh'

      - name: Build Arch package
        run: |
          runuser -u builder -- env \
            HOME=/home/builder \
            MAX_BUILD_THREADS=2 \
            PACKAGE_WITH_UPDATER=1 \
            bash -lc 'cd "'"$GITHUB_WORKSPACE"'" && make pacman'

      - name: Verify package
        run: |
          ls -lah dist/
          find dist -maxdepth 1 -type f -name '*.pkg.tar.*' -print
          test -n "$(find dist -maxdepth 1 -type f -name '*.pkg.tar.*' -print -quit)"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-arch-${{ github.run_number }}
          path: dist/*.pkg.tar.*
          if-no-files-found: error
          retention-days: 14
